name: Generate GitHub Stats

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Generate Stats Card
        uses: anuraghazra/github-readme-stats@latest
        with:
          username: vishnupriyavr
          theme: vision-friendly-dark
          show_icons: true
          include_all_commits: true
          count_private: true
          output_filename: github-stats.svg
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate Top Languages Card
        uses: anuraghazra/github-readme-stats@latest
        with:
          username: vishnupriyavr
          theme: vision-friendly-dark
          layout: compact
          hide: html
          output_filename: top-langs.svg
          card_type: top_langs
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Commit generated SVGs
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add github-stats.svg top-langs.svg
          git diff --cached --quiet || git commit -m "chore: update GitHub stats SVGs"
          git push
